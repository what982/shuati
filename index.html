        function getSyncDataForLibrary(libName) {
            const lib = libraries[libName];
            if (!lib) {
                return {
                    version: '1.0',
                    timestamp: new Date().toISOString(),
                    currentLibrary: libName,
                    libraryAreaCollapsed: libraryAreaCollapsed,
                    libraries: {}
                };
            }
            const libsForSync = {};
            libsForSync[libName] = {
                questions: lib.questions || [],
                userAnswers: lib.userAnswers || {},
                modifiedData: lib.modifiedData || {},
                wrongQuestions: Array.from(lib.wrongQuestions || [])
            };
            return {
                version: '1.0',
                timestamp: new Date().toISOString(),
                currentLibrary: libName,
                libraryAreaCollapsed: libraryAreaCollapsed,
                libraries: libsForSync
            };
        }

        function applySyncDataForLibrary(libName, data) {
            if (!data || !data.libraries || !data.libraries[libName]) return false;
            const remoteLib = data.libraries[libName];
            if (!libraries[libName]) {
                libraries[libName] = { questions: [], userAnswers: {}, modifiedData: {}, wrongQuestions: new Set() };
            }
            libraries[libName].questions = remoteLib.questions || [];
            libraries[libName].userAnswers = remoteLib.userAnswers || {};
            libraries[libName].modifiedData = remoteLib.modifiedData || {};
            libraries[libName].wrongQuestions = new Set(remoteLib.wrongQuestions || []);
            if (data.libraryAreaCollapsed !== undefined) {
                libraryAreaCollapsed = data.libraryAreaCollapsed;
            }
            if (libName === currentLibrary) {
                loadCurrentLibrary();
                updateWrongQuestions();
                render();
                renderLibraryList();
                const body = document.getElementById('libraryAreaBody');
                const icon = document.getElementById('libraryToggleIcon');
                if (libraryAreaCollapsed) {
                    body.classList.add('collapsed');
                    icon.classList.add('collapsed');
                } else {
                    body.classList.remove('collapsed');
                    icon.classList.remove('collapsed');
                }
            } else {
                saveLibraries();
            }
            return true;
        }

        async function uploadSingleLibrary(libName) {
            if (!supabaseConfig.url || !supabaseConfig.anonKey) return;
            const lib = libraries[libName];
            if (!lib) return;
            const fullData = getSyncDataForLibrary(libName);
            const headers = {
                'apikey': supabaseConfig.anonKey,
                'Authorization': `Bearer ${supabaseConfig.anonKey}`
            };
            const body = {
                user_id: 'default_user',
                library_name: libName,
                data: fullData,
                updated_at: new Date().toISOString()
            };

            const checkUrl =
                `${supabaseConfig.url}/rest/v1/shuati_user_data?select=id&user_id=eq.default_user&library_name=eq.${encodeURIComponent(libName)}`;
            const checkRes = await fetch(checkUrl, { headers });
            if (!checkRes.ok) {
                const errText = await checkRes.text();
                throw new Error(`查询失败: ${errText}`);
            }
            const existing = await checkRes.json();

            let response;
            const baseUrl = `${supabaseConfig.url}/rest/v1/shuati_user_data`;
            if (existing && existing.length > 0) {
                const id = existing[0].id;
                const patchUrl = `${baseUrl}?id=eq.${id}`;
                response = await fetch(patchUrl, {
                    method: 'PATCH',
                    headers: { ...headers, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                    body: JSON.stringify(body)
                });
            } else {
                response = await fetch(baseUrl, {
                    method: 'POST',
                    headers: { ...headers, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                    body: JSON.stringify(body)
                });
            }
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }
        }

        async function uploadAllLibraries() {
            if (!supabaseConfig.url || !supabaseConfig.anonKey) {
                showToast('请先配置 Supabase', 'warning');
                return;
            }
            const libNames = Object.keys(libraries);
            if (libNames.length === 0) { showToast('没有题库可上传', 'info'); return; }

            showLoading();
            let successCount = 0,
                failCount = 0;
            try {
                const tasks = libNames.map((libName) => {
                    return async () => {
                        try { await uploadSingleLibrary(libName); return true; } catch (err) { console.warn(
                                `上传 ${libName} 失败:`, err.message); return false; }
                    };
                });
                const results = await runWithConcurrency(tasks, 3);
                successCount = results.filter(r => r === true).length;
                failCount = results.length - successCount;
                if (successCount > 0) {
                    dataVersion = { userAnswers: 0, modifiedData: 0, questions: 0, wrongQuestions: 0 };
                    lastSyncedVersion = { userAnswers: 0, modifiedData: 0, questions: 0, wrongQuestions: 0 };
                    saveDataVersion();
                    showToast(`✅ 成功上传 ${successCount} 个题库${failCount > 0 ? `，${failCount} 个失败` : ''}`, successCount > 0 ?

        async function downloadAllLibraries() {
            if (!supabaseConfig.url || !supabaseConfig.anonKey) {
                showToast('请先配置 Supabase', 'warning');
                return;
            }

            showLoading();
            let result = null;
            try {
                const url =
                    `${supabaseConfig.url}/rest/v1/shuati_user_data?select=data,library_name&user_id=eq.default_user`;
                const headers = {
                    'apikey': supabaseConfig.anonKey,
                    'Authorization': `Bearer ${supabaseConfig.anonKey}`
                };
                const response = await fetch(url, { headers });
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errText}`);
                }
                result = await response.json();
                if (!result || result.length === 0) { showToast('云端暂无数据，请先上传', 'warning'); return; }
            } catch (err) {
                showToast('下载失败：' + err.message, 'error', 4000);
                console.error(err);
                return;
            } finally { hideLoading(); }

            const confirm = await showConfirm('全量下载', `将用云端数据覆盖本地所有 ${result.length} 个题库，确定继续吗？`);
            if (!confirm) return;

            showLoading();
            try {
                let newLibraries = {};
                let firstData = null;
                for (const row of result) {
                    const libName = row.library_name;
                    const rowData = row.data;
                    if (!rowData) continue;
                    if (rowData.libraries && rowData.libraries[libName]) {
                        const remoteLib = rowData.libraries[libName];
                        newLibraries[libName] = {
                            questions: remoteLib.questions || [],
                            userAnswers: remoteLib.userAnswers || {},
                            modifiedData: remoteLib.modifiedData || {},
                            wrongQuestions: new Set(remoteLib.wrongQuestions || [])
                        };
                        if (!firstData) firstData = rowData;
                    } else if (rowData.delta) {
                        if (!newLibraries[libName]) {
                            newLibraries[libName] = { questions: [], userAnswers: {}, modifiedData: {},
                                wrongQuestions: new Set() };
                        }
                        if (rowData.delta.questions) newLibraries[libName].questions = rowData.delta.questions;
                        if (rowData.delta.userAnswers) newLibraries[libName].userAnswers = rowData.delta.userAnswers;
                        if (rowData.delta.modifiedData) newLibraries[libName].modifiedData = rowData.delta
                        .modifiedData;
                        if (rowData.delta.wrongQuestions) newLibraries[libName].wrongQuestions = new Set(rowData.delta
                            .wrongQuestions);
                        if (!firstData) firstData = rowData;
                    }
                }

                libraries = newLibraries;
                if (firstData) {
                    if (firstData.currentLibrary && libraries[firstData.currentLibrary]) {
                        currentLibrary = firstData.currentLibrary;
                    } else { currentLibrary = Object.keys(libraries)[0] || '默认题库'; }
                    if (firstData.libraryAreaCollapsed !== undefined) {

                    }

                lastSyncedVersion = { userAnswers: 0, modifiedData: 0, questions: 0, wrongQuestions: 0 };
                saveDataVersion();

                saveLibraries();
                loadCurrentLibrary();
                updateWrongQuestions();
                render();
                renderLibraryList();

                    icon.classList.remove('collapsed');
                }

                const timeEl = document.getElementById('cloudLastSync');
                if (timeEl) {
                    const now = new Date().toLocaleString();
                    timeEl.textContent = '上次同步：' + now;
                    safeSetStorage('shuati_lastSyncTime', now);
                }
            } catch (err) {
                showToast('应用数据失败：' + err.message, 'error');

            } finally { hideLoading(); }
        }

                            .userAnswers;
                            if (rowData.delta.modifiedData) newLibraries[libName].modifiedData = rowData.delta
                                .modifiedData;
                            if (rowData.delta.wrongQuestions) newLibraries[libName].wrongQuestions = new Set(rowData
                                .delta.wrongQuestions);
                            if (!firstData) firstData = rowData;
                        }
                    }
                    if (Object.keys(newLibraries).length > 0) {
                        libraries = newLibraries;
                        if (firstData) {
                            if (firstData.currentLibrary && libraries[firstData.currentLibrary]) {
                                currentLibrary = firstData.currentLibrary;
                            } else { currentLibrary = Object.keys(libraries)[0] || '默认题库'; }

                        saveDataVersion();

                        }
                    }

            } catch (e) {

                if (retries > 0) {

                }
            }

        async function runWithConcurrency(tasks, concurrency = 3) {
            const results = [];
            const executing = [];
            for (const [index, task] of tasks.entries()) {
                const p = task().then(result => { results[index] = result; });
                executing.push(p);
                if (executing.length >= concurrency) {
                    await Promise.race(executing);
                    for (let i = executing.length - 1; i >= 0; i--) {
                        if (executing[i] && executing[i].isSettled) {
                            executing.splice(i, 1);
                        }
                    }
                }
            }
            await Promise.all(executing);
            return results;
        }

                    icon.classList.add('collapsed');
                }
                checkStorageUsage();
                populateChapterFilter();
                updatePositionAndRate();
                window.addEventListener('resize', updatePositionAndRate);
            }

            loadDataVersion();
            loadSupabaseConfig();
            setTimeout(autoDownloadOnLoad, 1000);
            const timeEl = document.getElementById('cloudLastSync');
            if (timeEl) {
                const lastSync = safeGetStorage('shuati_lastSyncTime');
                if (lastSync) timeEl.textContent = '上次同步：' + lastSync;
            }
        };
    </script>
</body>
</html>
