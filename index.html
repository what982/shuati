        const saved = safeGetStorage('imgbbApiKey', '');
        if (saved) {
        imgbbApiKey = saved;
        } else {
        showToast('请先设置 ImgBB API Key（点击“🔑 图床设置”）', 'error', 4000);
        return;
        }
        }
        try {
        showToast('正在上传图片到图床...', 'info', 2000);
        const url = await uploadToImgBB(file);
        const img = document.createElement('img');
        img.src = url;
        img.style.maxWidth = '100%';
        insertNodeAtCursor(img, element);
        showToast('图片上传成功！', 'success', 1500);
        } catch (error) {
        showToast('上传失败：' + error.message, 'error', 4000);
        }
        }

        function bindPasteImage(element) {
        if (!element) return;
        if (pasteHandlers.has(element)) {
        element.removeEventListener('paste', pasteHandlers.get(element));
        }
        const handler = function(e) {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        let imageItem = null;
        let textItem = null;

        for (let item of items) {
        if (item.type.match(/^image\/(png|jpeg|gif|webp|bmp)/i)) {
        imageItem = item;
        break;
        }
        }
        if (imageItem) {
        e.preventDefault();
        const file = imageItem.getAsFile();
        handleImageBlob(file, element);
        return;
        }

        for (let item of items) {
        if (item.type === 'text/html') {
        e.preventDefault();
        item.getAsString(function(html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        const imgs = div.querySelectorAll('img');
        let found = false;
        for (let img of imgs) {
        if (img.src && img.src.startsWith('data:image')) {
        fetch(img.src)
        .then(res => res.blob())
        .then(blob => {
        handleImageBlob(blob, element);
        })
        .catch(err => {
        showToast('提取图片失败：' + err.message, 'error');
        });
        found = true;
        break;
        }
        }
        if (!found) {
        const sel = window.getSelection();
        if (sel.rangeCount) {
        const range = sel.getRangeAt(0);
        range.deleteContents();
        const fragment = range.createContextualFragment(html);
        range.insertNode(fragment);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
        }
        }
        });
        return;
        }
        if (item.type === 'text/plain') {
        textItem = item;
        }
        }

        if (textItem) {
        e.preventDefault();
        textItem.getAsString(function(text) {
        const urlPattern = /^(https?:\/\/[^\s]+?\.(png|jpg|jpeg|gif|webp|bmp|svg|PNG|JPG|JPEG|GIF|WEBP|BMP|SVG))(\?.*)?$/i;
        const trimmed = text.trim();
        if (urlPattern.test(trimmed)) {
        const img = document.createElement('img');
        img.src = trimmed;
        img.style.maxWidth = '100%';
        insertNodeAtCursor(img, element);
        showToast('✅ 图片链接已插入！', 'success', 1500);
        } else {
        document.execCommand('insertText', false, text);
        }
        });
        return;
        }
        };
        element.addEventListener('paste', handler);
        pasteHandlers.set(element, handler);
        }

        // ============================================================
        // ★★★ 通用数据打包/应用函数（供云端同步使用）★★★
        // ============================================================
        function getSyncData() {
        const libsForSync = {};
        for (let name in libraries) {
        const lib = libraries[name];
        libsForSync[name] = {
        questions: lib.questions || [],
        userAnswers: lib.userAnswers || {},
        modifiedData: lib.modifiedData || {},
        wrongQuestions: Array.from(lib.wrongQuestions || [])
        };
        }
        return {
        version: '1.0',
        timestamp: new Date().toISOString(),
        currentLibrary: currentLibrary,
        libraryAreaCollapsed: libraryAreaCollapsed,
        libraries: libsForSync
        };
        }

        function applySyncData(data) {
        if (!data || !data.libraries) return false;
        const newLibs = {};
        for (let name in data.libraries) {
        const lib = data.libraries[name];
        newLibs[name] = {
        questions: lib.questions || [],
        userAnswers: lib.userAnswers || {},
        modifiedData: lib.modifiedData || {},
        wrongQuestions: new Set(lib.wrongQuestions || [])
        };
        }
        libraries = newLibs;
        if (data.currentLibrary && libraries[data.currentLibrary]) {
        currentLibrary = data.currentLibrary;
        } else {
        currentLibrary = Object.keys(libraries)[0] || '默认题库';
        }
        if (data.libraryAreaCollapsed !== undefined) {
        libraryAreaCollapsed = data.libraryAreaCollapsed;
        }
        loadCurrentLibrary();
        saveLibraries();
        render();
        renderLibraryList();
        const body = document.getElementById('libraryAreaBody');
        const icon = document.getElementById('libraryToggleIcon');
        if (libraryAreaCollapsed) {
        body.classList.add('collapsed');
        icon.classList.add('collapsed');
        } else {
        body.classList.remove('collapsed');
        icon.classList.remove('collapsed');
        }
        return true;
        }

        // ============================================================
        // ★★★ Supabase 云端同步模块 ★★★
        // ============================================================

        let supabaseClient = null;
        let supabaseConfig = { url: '', anonKey: '' };

        function loadSupabaseConfig() {
        supabaseConfig.url = safeGetStorage('supabase_url', '');
        supabaseConfig.anonKey = safeGetStorage('supabase_anonKey', '');
        if (supabaseConfig.url && supabaseConfig.anonKey) {
        try {
        supabaseClient = window.supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);
        } catch (e) { console.warn('Supabase 初始化失败', e); }
        }
        }

        function saveSupabaseConfig(url, anonKey) {
        supabaseConfig.url = url;
        supabaseConfig.anonKey = anonKey;
        safeSetStorage('supabase_url', url);
        safeSetStorage('supabase_anonKey', anonKey);
        try {
        supabaseClient = window.supabase.createClient(url, anonKey);
        } catch (e) { showToast('配置无效，请检查 URL 和 Key', 'error'); return; }
        showToast('Supabase 配置已保存', 'success');
        }

        function configSupabase() {
        const url = prompt('请输入 Supabase Project URL（例如 https://xxxxx.supabase.co）：', supabaseConfig.url || '');
        if (url === null) return;
        const anonKey = prompt('请输入 Supabase anon public 密钥：', supabaseConfig.anonKey || '');
        if (anonKey === null) return;
        const trimmedUrl = url.trim();
        const trimmedKey = anonKey.trim();
        if (trimmedUrl && trimmedKey) {
        saveSupabaseConfig(trimmedUrl, trimmedKey);
        } else {
        showToast('URL 和 Key 不能为空', 'error');
        }
        }

        async function uploadToSupabase() {
        if (!supabaseClient) {
        showToast('请先配置 Supabase（点击 "☁️ Supabase配置"）', 'warning');
        return;
        }
        showLoading();
        try {
        const data = getSyncData();
        const libraryName = data.currentLibrary || '默认题库';
        const { error } = await supabaseClient
        .from('shuati_user_data')
        .upsert({
        user_id: 'default_user',
        library_name: libraryName,
        data: data,
        updated_at: new Date().toISOString()
        }, { onConflict: 'user_id, library_name' });

        if (error) throw error;
        showToast('☁️ 数据已同步到 Supabase！', 'success');
        document.getElementById('cloudLastSync').textContent = '上次同步：' + new Date().toLocaleString();
        } catch (err) {
        showToast('上传失败：' + err.message, 'error', 4000);
        console.error(err);
        } finally {
        hideLoading();
        }
        }

        async function downloadFromSupabase() {
        if (!supabaseClient) {
        showToast('请先配置 Supabase', 'warning');
        return;
        }
        showLoading();
        try {
        const libraryName = currentLibrary || '默认题库';
        const { data, error } = await supabaseClient
        .from('shuati_user_data')
        .select('data')
        .eq('user_id', 'default_user')
        .eq('library_name', libraryName)
        .single();

        if (error) {
        if (error.code === 'PGRST116') {
        showToast('云端暂无数据，请先上传', 'warning');
        } else {
        throw error;
        }
        return;
        }
        if (!data) {
        showToast('云端暂无数据，请先上传', 'warning');
        return;
        }

        const confirm = await showConfirm('从云端恢复', '将用云端数据覆盖当前所有本地数据，确定继续吗？');
        if (!confirm) return;

        applySyncData(data.data);
        showToast('☁️ 数据已从 Supabase 恢复！', 'success');
        document.getElementById('cloudLastSync').textContent = '上次同步：' + new Date().toLocaleString();
        } catch (err) {
        showToast('下载失败：' + err.message, 'error', 4000);
        console.error(err);
        } finally {
        hideLoading();
        }
        }

        // --- 自动同步 ---
        let autoSyncEnabled = true;
        let isFirstLoad = true;

        function loadAutoSyncSetting() {
        const val = safeGetStorage('supabase_autoSync', 'true');
        autoSyncEnabled = (val === 'true');
        const toggle = document.getElementById('autoSyncToggle');
        if (toggle) toggle.checked = autoSyncEnabled;
        }

        async function autoDownloadOnLoad() {
        if (!autoSyncEnabled) return;
        if (!supabaseClient) return;
        if (!isFirstLoad) return;
        isFirstLoad = false;
        try {
        const libraryName = currentLibrary || '默认题库';
        const { data, error } = await supabaseClient
        .from('shuati_user_data')
        .select('data')
        .eq('user_id', 'default_user')
        .eq('library_name', libraryName)
        .single();
        if (error) {
        if (error.code !== 'PGRST116') console.warn('自动下载出错', error);
        return;
        }
        if (data && data.data) {
        applySyncData(data.data);
        showToast('☁️ 已自动同步云端数据', 'info', 2000);
        document.getElementById('cloudLastSync').textContent = '上次同步：' + new Date().toLocaleString();
        }
        } catch (e) { console.warn('自动下载失败', e); }
        }

        async function autoUploadOnUnload() {
    if (!autoSyncEnabled) return;
    if (!supabaseClient) return;
    try {
        const data = getSyncData();
        const libraryName = data.currentLibrary || '默认题库';
        // 手动构造 URL 和 headers
        const url = supabaseConfig.url + '/rest/v1/shuati_user_data?on_conflict=user_id%2C+library_name';
        const headers = {
            'Content-Type': 'application/json',
            'apikey': supabaseConfig.anonKey,
            'Authorization': 'Bearer ' + supabaseConfig.anonKey
        };
        const body = JSON.stringify({
            user_id: 'default_user',
            library_name: libraryName,
            data: data,
            updated_at: new Date().toISOString()
        });
        // 使用 keepalive: true 确保页面关闭后请求继续
        const response = await fetch(url, {
            method: 'POST',
            headers: headers,
            body: body,
            keepalive: true
        });
        if (response.ok) {
            console.log('自动上传成功');
        } else {
            console.warn('自动上传状态码:', response.status);
        }
    } catch (e) {
        console.warn('自动上传失败', e);
    }
}

        // --- 注入 UI ---
        function injectSupabaseUI() {
        const toolbar = document.getElementById('toolbar');
        if (!toolbar) return;

        const configBtn = document.createElement('button');
        configBtn.className = 'btn btn-secondary';
        configBtn.innerHTML = '☁️ Supabase配置';
        configBtn.onclick = configSupabase;
        toolbar.appendChild(configBtn);

        const syncGroup = document.createElement('span');
        syncGroup.style.cssText = 'display:inline-flex;gap:4px;align-items:center;margin-left:4px;flex-wrap:wrap;';

        const uploadBtn = document.createElement('button');
        uploadBtn.className = 'btn btn-sm btn-success';
        uploadBtn.textContent = '⬆️ 上传';
        uploadBtn.onclick = uploadToSupabase;
        syncGroup.appendChild(uploadBtn);

        const downloadBtn = document.createElement('button');
        downloadBtn.className = 'btn btn-sm btn-warning';
        downloadBtn.textContent = '⬇️ 下载';
        downloadBtn.onclick = downloadFromSupabase;
        syncGroup.appendChild(downloadBtn);

        const autoLabel = document.createElement('label');
        autoLabel.style.cssText = 'display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#555;';
        const autoCheck = document.createElement('input');
        autoCheck.type = 'checkbox';
        autoCheck.id = 'autoSyncToggle';
        autoCheck.checked = autoSyncEnabled;
        autoCheck.onchange = function() {
        autoSyncEnabled = this.checked;
        safeSetStorage('supabase_autoSync', autoSyncEnabled ? 'true' : 'false');
        showToast(autoSyncEnabled ? '自动同步已开启' : '自动同步已关闭', 'info');
        };
        autoLabel.appendChild(autoCheck);
        autoLabel.appendChild(document.createTextNode('自动同步'));
        syncGroup.appendChild(autoLabel);

        const timeSpan = document.createElement('span');
        timeSpan.id = 'cloudLastSync';
        timeSpan.style.cssText = 'font-size:12px;color:#888;margin-left:4px;';
        timeSpan.textContent = '上次同步：--';
        syncGroup.appendChild(timeSpan);

        toolbar.appendChild(syncGroup);
        }

        // ============================================================
        // 18. 初始化
        // ============================================================
        // 保存原有 onload 以避免覆盖
        const originalOnload = window.onload;

        window.onload = function() {
        // 1. 执行原有初始化（加载数据、渲染等）
        if (typeof originalOnload === 'function') {
        originalOnload.call(this);
        } else {
        // 如果没有原有的 onload，执行基本初始化
        loadLibraries();
        if (Object.keys(libraries).length === 0) initDefaultLibrary();
        loadCurrentLibrary();
        render();
        renderLibraryList();
        const body = document.getElementById('libraryAreaBody');
        const icon = document.getElementById('libraryToggleIcon');
        if (libraryAreaCollapsed) {
        body.classList.add('collapsed');
        icon.classList.add('collapsed');
        }
        checkStorageUsage();
        populateChapterFilter();
        updatePosition();
        window.addEventListener('resize', updatePosition);
        }

        // 2. 加载 Supabase 配置和自动同步设置
        loadSupabaseConfig();
        loadAutoSyncSetting();

        // 3. 注入 Supabase UI
        injectSupabaseUI();

        // 4. 自动下载（如果开启且首次加载）
        if (autoSyncEnabled) {
        setTimeout(autoDownloadOnLoad, 500);
        }

        // 5. 绑定页面关闭事件（自动上传）
        window.addEventListener('beforeunload', function(e) {
        if (autoSyncEnabled) {
        autoUploadOnUnload().catch(() => {});
        }
        });
        };
    </script>
